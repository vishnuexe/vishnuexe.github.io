name: Update hobbies (games & films)

on:
  schedule:
    - cron: '17 6 * * 0'   # every Sunday 06:17 UTC
  workflow_dispatch:        # lets you run it on demand from the Actions tab

permissions:
  contents: write

concurrency:
  group: update-hobbies
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Playwright + Chromium
        run: |
          python -m pip install --upgrade pip
          pip install playwright
          python -m playwright install --with-deps chromium

      - name: Fetch latest games & films
        run: python scripts/fetch_hobbies.py

      - name: Commit changes (if any)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/games.json data/films.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: weekly refresh of games & films"
            git push
          fi
